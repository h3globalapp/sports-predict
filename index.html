<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Betting Combo PWA</title>
  <style>
    body { font-family: Arial; padding: 20px; background:#0f172a; color:white; }
    h1 { text-align:center; }
    .card { background:#1e293b; padding:15px; margin:10px 0; border-radius:10px; }
    input, select { width:100%; padding:10px; margin-top:5px; border-radius:6px; border:none; }
    button { padding:12px; width:100%; margin-top:10px; background:#22c55e; border:none; border-radius:8px; color:white; font-size:16px; }
    .result { margin-top:20px; font-size:18px; }
  </style>
</head>
<body>
  <h1>⚽ Smart Combo Generator (~3.0 Odds)</h1>

  <div class="card">
    <label>Match 1 Odds</label>
    <input type="number" id="m1" step="0.01" placeholder="e.g 1.80">
    <select id="m1type">
      <option value="dnb">Draw No Bet</option>
      <option value="plus1">+1 Handicap</option>
      <option value="minus1">-1 Handicap</option>
    </select>
  </div>

  <div class="card">
    <label>Match 2 Odds</label>
    <input type="number" id="m2" step="0.01" placeholder="e.g 1.55">
    <select id="m2type">
      <option value="dnb">Draw No Bet</option>
      <option value="plus1">+1 Handicap</option>
      <option value="minus1">-1 Handicap</option>
    </select>
  </div>

  <div class="card">
    <label>Match 3 Odds (Optional)</label>
    <input type="number" id="m3" step="0.01" placeholder="e.g 1.30">
    <select id="m3type">
      <option value="none">None</option>
      <option value="dnb">Draw No Bet</option>
      <option value="plus15">+1.5 Handicap</option>
    </select>
  </div>

  <button onclick="generate()">Generate Combo</button>

  <div class="result" id="result"></div>

  <script>
    function isValid(odds, type){
      if(type === 'dnb') return odds >= 1.7 && odds <= 2.0;
      if(type === 'plus1') return odds >= 1.4 && odds <= 1.7;
      if(type === 'minus1') return odds >= 1.5 && odds <= 1.9;
      if(type === 'plus15') return odds >= 1.25 && odds <= 1.45;
      return true;
    }

    function generate(){
      let m1 = parseFloat(document.getElementById('m1').value);
      let m2 = parseFloat(document.getElementById('m2').value);
      let m3 = parseFloat(document.getElementById('m3').value);

      let t1 = document.getElementById('m1type').value;
      let t2 = document.getElementById('m2type').value;
      let t3 = document.getElementById('m3type').value;

      let valid = isValid(m1,t1) && isValid(m2,t2) && (t3==='none' || isValid(m3,t3));

      if(!valid){
        document.getElementById('result').innerText = "❌ No bet today (invalid odds structure)";
        return;
      }

      let total = m1 * m2 * (t3==='none' ? 1 : m3);

      if(total < 2.8 || total > 3.3){
        document.getElementById('result').innerText = "❌ No bet today (does not meet 3.0 target)";
        return;
      }

      document.getElementById('result').innerText = `✅ Combo Ready! Total Odds: ${total.toFixed(2)}`;
    }
  </script>
</body>
</html>
