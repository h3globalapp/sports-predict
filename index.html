<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HT Draw Analyzer</title>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f172a">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 15px;
      margin: 0;
    }

    h1 {
      font-size: 20px;
    }

    input, button {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      border: none;
      font-size: 16px;
    }

    button {
      background: #22c55e;
      color: black;
      font-weight: bold;
    }

    .match {
      background: #1e293b;
      padding: 12px;
      margin-top: 10px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<h1>HT Draw Analyzer</h1>

<input type="file" id="pdfInput" accept="application/pdf">
<button onclick="processPDF()">Analyze Matches</button>

<button id="installBtn" style="display:none;">Install App</button>

<div id="results"></div>

<script src="app.js"></script>

</body>
</html>
