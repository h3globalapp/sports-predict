<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Combo Generator (Manual Input)</title>
  <style>
    body { font-family: Arial; padding: 20px; background:#0f172a; color:white; }
    h1 { text-align:center; }
    .card { background:#1e293b; padding:15px; margin:10px 0; border-radius:10px; }
    input, select { width:100%; padding:10px; margin-top:5px; border-radius:6px; border:none; }
    button { padding:12px; width:100%; margin-top:10px; background:#22c55e; border:none; border-radius:8px; color:white; font-size:16px; }
    .result { margin-top:20px; font-size:18px; white-space:pre-line; }
  </style>
</head>
<body>
  <h1>⚽ Smart Combo Generator (~3.0)</h1>

  <!-- Match Inputs (you enter candidates) -->
  <div class="card">
    <label>Match 1 (Teams)</label>
    <input id="m1name" placeholder="e.g Team A vs Team B">
    <label>DNB Odds</label>
    <input type="number" id="m1dnb" step="0.01" placeholder="e.g 1.85">
    <label>+1 Handicap Odds</label>
    <input type="number" id="m1p1" step="0.01" placeholder="e.g 1.55">
    <label>-1 Handicap Odds</label>
    <input type="number" id="m1m1" step="0.01" placeholder="e.g 1.70">
  </div>

  <div class="card">
    <label>Match 2 (Teams)</label>
    <input id="m2name" placeholder="e.g Team C vs Team D">
    <label>DNB Odds</label>
    <input type="number" id="m2dnb" step="0.01">
    <label>+1 Handicap Odds</label>
    <input type="number" id="m2p1" step="0.01">
    <label>-1 Handicap Odds</label>
    <input type="number" id="m2m1" step="0.01">
  </div>

  <div class="card">
    <label>Match 3 (Teams)</label>
    <input id="m3name" placeholder="optional">
    <label>DNB Odds</label>
    <input type="number" id="m3dnb" step="0.01">
    <label>+1.5 Handicap Odds</label>
    <input type="number" id="m3p15" step="0.01" placeholder="e.g 1.30">
  </div>

  <button onclick="run()">Generate Best Combo</button>

  <div class="result" id="result"></div>

  <script>
    // value zones
    const inRange = (x,a,b)=> x>=a && x<=b;

    function pickForMatch(name, dnb, p1, m1){
      // priority: DNB (1.7-2.0), +1 (1.4-1.7), -1 (1.5-1.9)
      if(dnb && inRange(dnb,1.7,2.0)) return {name, market:'DNB', odds:dnb};
      if(p1 && inRange(p1,1.4,1.7)) return {name, market:'+1 HCP', odds:p1};
      if(m1 && inRange(m1,1.5,1.9)) return {name, market:'-1 HCP', odds:m1};
      return null;
    }

    function run(){
      const m1 = pickForMatch(
        document.getElementById('m1name').value,
        parseFloat(document.getElementById('m1dnb').value),
        parseFloat(document.getElementById('m1p1').value),
        parseFloat(document.getElementById('m1m1').value)
      );

      const m2 = pickForMatch(
        document.getElementById('m2name').value,
        parseFloat(document.getElementById('m2dnb').value),
        parseFloat(document.getElementById('m2p1').value),
        parseFloat(document.getElementById('m2m1').value)
      );

      const m3name = document.getElementById('m3name').value;
      const m3dnb = parseFloat(document.getElementById('m3dnb').value);
      const m3p15 = parseFloat(document.getElementById('m3p15').value);
      let m3 = null;
      if(m3name){
        if(m3dnb && inRange(m3dnb,1.7,2.0)) m3 = {name:m3name, market:'DNB', odds:m3dnb};
        else if(m3p15 && inRange(m3p15,1.25,1.45)) m3 = {name:m3name, market:'+1.5 HCP', odds:m3p15};
      }

      // collect valid picks
      let picks = [m1, m2, m3].filter(Boolean);

      if(picks.length < 2){
        document.getElementById('result').innerText = '❌ No bet today (not enough valid picks)';
        return;
      }

      // try best 2 first
      let best = null;
      for(let i=0;i<picks.length;i++){
        for(let j=i+1;j<picks.length;j++){
          const total = picks[i].odds * picks[j].odds;
          if(total>=2.8 && total<=3.3){
            best = [picks[i], picks[j], total];
          }
        }
      }

      // if not found, try 3-combo
      if(!best && picks.length===3){
        const total = picks[0].odds * picks[1].odds * picks[2].odds;
        if(total>=2.8 && total<=3.3){
          best = [picks[0], picks[1], picks[2], total];
        }
      }

      if(!best){
        document.getElementById('result').innerText = '❌ No bet today (no valid 3.0 combo)';
        return;
      }

      // format output
      let txt = '✅ TODAY\'S COMBO:\n\n';
      if(best.length===3){
        txt += `1. ${best[0].name} → ${best[0].market} (${best[0].odds})\n`;
        txt += `2. ${best[1].name} → ${best[1].market} (${best[1].odds})\n`;
        txt += `\nTotal Odds: ${best[2].toFixed(2)}`;
      } else {
        txt += `1. ${best[0].name} → ${best[0].market} (${best[0].odds})\n`;
        txt += `2. ${best[1].name} → ${best[1].market} (${best[1].odds})\n`;
        txt += `3. ${best[2].name} → ${best[2].market} (${best[2].odds})\n`;
        txt += `\nTotal Odds: ${best[3].toFixed(2)}`;
      }

      document.getElementById('result').innerText = txt;
    }
  </script>
</body>
</html>
